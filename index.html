<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞼の裏の土と星</title>
    <style>
        body {
            background-color: #0a0f1e; color: #fff8e1;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; width: 100vw; margin: 0;
            font-family: "Inter", sans-serif; font-weight: 200;
            overflow: hidden; cursor: pointer; user-select: none;
            touch-action: manipulation;
        }
        .main-message { text-align: center; opacity: 0; animation: fadeIn 6s ease-in-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
        p { font-size: 1rem; line-height: 2.8; letter-spacing: 0.2em; margin: 0; }
        .quiet { margin-top: 40px; font-size: 0.85rem; color: rgba(255, 248, 225, 0.35); }
    </style>
</head>
<body>

    <div class="main-message">
        <p>今日も一日お疲れさまでした</p>
        <p>ここはただ静かに、</p>
        <p>時間が過ぎるのを待つ場所です</p>
        <p>何もしなくていい</p>
        <p>ただそこにいて</p>
        <p class="quiet">(なるべくここにいる)<a href="secret.html" style="color:inherit; text-decoration:none;">。</a></p>
    </div>

    <div style="margin-top: 50px;">
        <a href="secret.html" style="text-decoration: none;">🏕️</a>
    </div>

    <script>
        const soundList = [
            "Wind_04.mp3", "rain_03.mp3", "morning_01.mp3", "landscape_03.mp3",
            "river_04.mp3", "forest.mp3", "wave_35.mp3", "child_playing.mp3",
            "room_ambient_03.mp3", "room_ambient_04.mp3", "library_1.mp3"
        ];

        let audio = null;
        let fadeInterval = null;

        // 音を完全に消し去る（重複・残響防止）
        function stopAndClear() {
            clearInterval(fadeInterval);
            if (audio) {
                audio.pause();
                audio.src = ""; // データを空にする
                audio.load();   // 読み込みをリセット
                audio = null;
            }
        }

        function handleInteraction() {
            // すでに音が鳴っている（＝audioが存在する）なら止める
            if (audio) {
                stopAndClear();
            } else {
                playNext();
            }
        }

        function playNext() {
            stopAndClear(); // 念のため実行

            const randomIndex = Math.floor(Math.random() * soundList.length);
            audio = new Audio(soundList[randomIndex]);
            audio.loop = true;
            audio.volume = 0;
            
            audio.play().catch(e => console.log("再生制限中"));

            // 音量は控えめの 0.1 ターゲット
            fadeInterval = setInterval(() => {
                if (audio && audio.volume < 1.9) {
                    audio.volume = parseFloat((audio.volume + 0.01).toFixed(2));
                } else {
                    clearInterval(fadeInterval);
                }
            }, 50);
        }

        // 画面全体のクリックを監視
        document.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            handleInteraction();
        }, false);

        // スマホが閉じられたら即座に抹殺
        window.addEventListener("pagehide", stopAndClear);
        window.addEventListener("visibilitychange", () => { if (document.hidden) stopAndClear(); });
    </script>
</body>
</html>
