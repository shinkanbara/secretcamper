<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞼の裏の土と星</title>
    <style>
        body {
            background-color: #0a0f1e;
            color: #fff8e1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: "Inter", "Helvetica Neue", "Arial", "Hiragino Sans", "Meiryo", sans-serif;
            font-weight: 200;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .main-message {
            text-align: center;
            opacity: 0;
            animation: fadeIn 6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        p {
            font-size: 1rem;
            line-height: 2.8;
            letter-spacing: 0.2em;
            margin: 0;
        }

        .quiet {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 248, 225, 0.35);
            font-weight: 100;
        }
    </style>
</head>
<body>

    <div class="main-message">
        <p>今日も一日お疲れさまでした</p>
        <p>ここはただ静かに、</p>
        <p>時間が過ぎるのを待つ場所です</p>
        <p>何もしなくていい</p>
        <p>ただそこにいて</p>
        <p class="quiet">(なるべくここにいる)<a href="secret.html" style="color:inherit; text-decoration:none;">。</a></p>
    </div>

    <div style="margin-top: 50px;">
        <a href="secret.html" style="text-decoration: none;">🏕️</a>
    </div>

    <script>
        const soundList = [
            "Wind_04.mp3", "rain_03.mp3", "morning_01.mp3", "landscape_03.mp3",
            "river_04.mp3", "forest.mp3", "wave_35.mp3", "child_playing.mp3",
            "room_ambient_03.mp3", "room_ambient_04.mp3", "library_1.mp3"
        ];

        let currentAudio = null;
        let fadeInterval = null;

        // 全ての音を「今すぐ」抹殺する関数
        function killAllSounds() {
            clearInterval(fadeInterval);
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.src = ""; // ソースを空にしてメモリからも消す
                currentAudio.load();
                currentAudio = null;
            }
        }

        function handleInteraction() {
            // もし鳴ってたら消す、鳴ってなかったら次を鳴らす
            if (currentAudio && !currentAudio.paused) {
                fadeOutAndStop();
            } else {
                playRandomSound();
            }
        }

        function playRandomSound() {
            killAllSounds(); // 再生前に必ず全リセット（重複防止）

            const randomIndex = Math.floor(Math.random() * soundList.length);
            currentAudio = new Audio(soundList[randomIndex]);
            currentAudio.loop = true;
            currentAudio.volume = 0;
            
            currentAudio.play().catch(e => console.log("再生不可:", e));

            fadeInterval = setInterval(() => {
                if (currentAudio && currentAudio.volume < 0.19) {
                    currentAudio.volume = parseFloat((currentAudio.volume + 0.01).toFixed(2));
                } else {
                    clearInterval(fadeInterval);
                }
            }, 50);
        }

        function fadeOutAndStop() {
            if (!currentAudio) return;
            clearInterval(fadeInterval);
            
            const audioToStop = currentAudio;
            // フェードアウト中も次のクリックを受け付けられるように currentAudio は先に空にする
            currentAudio = null; 

            let outInterval = setInterval(() => {
                if (audioToStop.volume > 0.02) {
                    audioToStop.volume = parseFloat((audioToStop.volume - 0.02).toFixed(2));
                } else {
                    audioToStop.pause();
                    audioToStop.src = "";
                    clearInterval(outInterval);
                }
            }, 50); 
        }

        document.addEventListener('click', function(e) {
            if (e.target.closest('a')) return;
            handleInteraction();
        });

        // スマホ対策：ページを閉じたり隠したりした瞬間「即死」させる
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'hidden') killAllSounds(); });
        window.addEventListener("pagehide", killAllSounds);
        window.addEventListener("blur", killAllSounds); // ブラウザから離れた瞬間も止める
    </script>
</body>
</html>
