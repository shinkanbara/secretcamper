<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞼の裏の土と星</title>
    <style>
        body {
            background-color: #0a0f1e;
            color: #fff8e1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Inter", "Helvetica Neue", "Arial", "Hiragino Sans", "Meiryo", sans-serif;
            font-weight: 200;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .main-message {
            text-align: center;
            opacity: 0;
            animation: fadeIn 6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        p {
            font-size: 1rem;
            line-height: 2.8;
            letter-spacing: 0.2em;
            margin: 0;
        }

        .quiet {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 248, 225, 0.35);
            font-weight: 100;
        }

        .secret-link { color: inherit; text-decoration: none; cursor: default; }
    </style>
</head>
<body onclick="handleInteraction()">

    <div class="main-message">
        <p>今日も一日お疲れさまでした</p>
        <p>ここはただ静かに、</p>
        <p>時間が過ぎるのを待つ場所です</p>
        <p>何もしなくていい</p>
        <p>ただそこにいて</p>
        <p class="quiet">(なるべくここにいる)<a href="secret.html" class="secret-link">。</a></p>
    </div>

    <script>
        // --- 鳴らしたい音のリスト ---
        const soundList = [
            "Wind_04.mp3",
            "rain_03.mp3",
            "morning_01.mp3",
            "landscape_03.mp3",
            "river_04.mp3",
            "forest.mp3",
            "wave_35.mp3",
            "child_playing.mp3",
            "room_ambient_03.mp3",
            "room_ambient_04.mp3",
            "library_1.mp3",
        ];

        let currentAudio = null;
        let fadeInterval = null;

        function handleInteraction() {
            // もし今音が鳴っとるなら、フェードアウトして止める
            if (currentAudio && !currentAudio.paused) {
                fadeOutAndStop();
                return;
            }

            // 音を鳴らす（ランダムに選ぶ）
            const randomIndex = Math.floor(Math.random() * soundList.length);
            const selectedSound = soundList[randomIndex];

            const audio = new Audio(selectedSound);
            audio.loop = true;
            audio.volume = 0; // 最初は音量0から
            
            audio.play().catch(e => {
                console.error("再生エラー：", e);
            });

            // 【極上フェードイン】
            // 0.05秒ごとに0.01ずつ、じわじわと音量を0.2まで上げる
            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (audio.volume < 0.19) {
                    audio.volume = parseFloat((audio.volume + 0.01).toFixed(2));
                } else {
                    audio.volume = 0.2; 
                    clearInterval(fadeInterval);
                }
            }, 50);

            currentAudio = audio;
        }

        function fadeOutAndStop() {
            if (!currentAudio) return;
            const audioToStop = currentAudio;
            clearInterval(fadeInterval);
            
            // 【極上フェードアウト】
            fadeInterval = setInterval(() => {
                if (audioToStop.volume > 0.01) {
                    audioToStop.volume = parseFloat((audioToStop.volume - 0.01).toFixed(2));
                } else {
                    audioToStop.pause();
                    audioToStop.currentTime = 0;
                    clearInterval(fadeInterval);
                }
            }, 50); 
        }

        // ページが隠れたら即座にフェードアウト
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden') {
                fadeOutAndStop();
            }
        });
    </script>

    <div style="margin-top: 50px;">
        <a href="secret.html" style="text-decoration: none; opacity: 0.1;">🏕️</a>
    </div>

</body>
</html>
