<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞼の裏の土と星</title>
    <style>
        body {
            background-color: #0a0f1e;
            color: #fff8e1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: "Inter", "Helvetica Neue", "Arial", "Hiragino Sans", "Meiryo", sans-serif;
            font-weight: 200;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .main-message {
            text-align: center;
            opacity: 0;
            animation: fadeIn 6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        p {
            font-size: 1rem;
            line-height: 2.8;
            letter-spacing: 0.2em;
            margin: 0;
        }

        .quiet {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 248, 225, 0.35);
            font-weight: 100;
        }

        .secret-link { color: inherit; text-decoration: none; cursor: default; }
    </style>
</head>
<body>

    <div class="main-message">
        <p>今日も一日お疲れさまでした</p>
        <p>ここはただ静かに、</p>
        <p>時間が過ぎるのを待つ場所です</p>
        <p>何もしなくていい</p>
        <p>ただそこにいて</p>
        <p class="quiet">(なるべくここにいる)<a href="secret.html" class="secret-link">。</a></p>
    </div>

    <div style="margin-top: 50px;">
        <a href="secret.html" style="text-decoration: none;">🏕️</a>
    </div>

    <script>
        const soundList = [
            "Wind_04.mp3",
            "rain_03.mp3",
            "morning_01.mp3",
            "landscape_03.mp3",
            "river_04.mp3",
            "forest.mp3",
            "wave_35.mp3",
            "child_playing.mp3",
            "room_ambient_03.mp3",
            "room_ambient_04.mp3",
            "library_1.mp3",
        ];

        let currentAudio = null;
        let fadeInterval = null;
        let isPlaying = false; // スマホが勘違いしないための確実な目印

        function handleInteraction() {
            if (isPlaying) {
                fadeOutAndStop();
            } else {
                playRandomSound();
            }
        }

        function playRandomSound() {
            isPlaying = true; // 鳴らし始めたよ！という目印
            const randomIndex = Math.floor(Math.random() * soundList.length);
            
            currentAudio = new Audio(soundList[randomIndex]);
            currentAudio.loop = true;
            currentAudio.volume = 0;
            
            currentAudio.play().catch(e => {
                console.error("再生エラー：", e);
                isPlaying = false; // 失敗したら目印を戻す
            });

            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (currentAudio && currentAudio.volume < 0.29) {
                    currentAudio.volume = parseFloat((currentAudio.volume + 0.01).toFixed(2));
                } else if (currentAudio) {
                    currentAudio.volume = 0.3; 
                    clearInterval(fadeInterval);
                }
            }, 50);
        }

        function fadeOutAndStop() {
            isPlaying = false; // 止めるよ！という目印
            if (!currentAudio) return;
            
            const audioToStop = currentAudio;
            currentAudio = null; // 次のタップですぐ新しい音が鳴るように切り離す
            clearInterval(fadeInterval);
            
            let outInterval = setInterval(() => {
                if (audioToStop.volume > 0.01) {
                    audioToStop.volume = parseFloat((audioToStop.volume - 0.01).toFixed(2));
                } else {
                    audioToStop.pause();
                    audioToStop.currentTime = 0;
                    clearInterval(outInterval);
                }
            }, 50); 
        }

        // 画面全体に「クリック（タップ）」を監視する透明な魔法をかけたよ
        document.addEventListener('click', function(e) {
            // もしタップしたのが「リンク(aタグ)」なら、音の再生・停止はしない
            if (e.target.closest('a')) return;
            handleInteraction();
        });

        function immediateStop() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                clearInterval(fadeInterval);
                isPlaying = false;
            }
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden') immediateStop();
        });
        window.addEventListener("pagehide", immediateStop);
    </script>

</body>
</html>
