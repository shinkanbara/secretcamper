<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シークレットキャンプ🏕️</title>
    <style>
        body { 
            background-color: #0a0f1e; 
            color: #fff8e1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            margin: 0; 
            padding: 50px 20px; 
            box-sizing: border-box;
            font-family: sans-serif; 
            font-weight: 200; 
            cursor: pointer; 
            touch-action: manipulation; /* スマホタップ改善 */
        }
        
        /* 戻るボタン */
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 248, 225, 0.8);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.5s;
            z-index: 10;
        }
        .back-link:hover {
            opacity: 0.5;
        }

        /* 画面全体のフェードイン魔法 */
        .fade-in-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            opacity: 0;
            animation: fadeIn 5s ease-in-out forwards; /* 5秒かけてじわっと表示 */
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1rem; margin-bottom: 50px; color: rgba(255, 248, 225, 0.5); font-weight: 100; pointer-events: none; }
        
        #post-area { margin-bottom: 60px; text-align: center; width: 100%; max-width: 500px; cursor: auto; }
        input[type="text"] { background: transparent; border: none; border-bottom: 1px solid rgba(255, 248, 225, 0.5); color: #fff8e1; padding: 10px; width: 70%; outline: none; font-size: 1rem; }
        button { background: transparent; border: 1px solid #fff8e1; color: #fff8e1; border-radius: 20px; padding: 5px 20px; margin-left: 10px; cursor: pointer; }
        
        #timeline { width: 100%; max-width: 500px; pointer-events: none; }
        .post { border-bottom: 1px solid rgba(255, 248, 225, 0.1); padding: 25px 0; }
        p { font-size: 0.95rem; line-height: 1.8; letter-spacing: 0.1em; margin: 0; white-space: pre-wrap; }
        .post-info { font-size: 0.7rem; color: rgba(255, 248, 225, 0.3); margin-top: 10px; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body onclick="playClickSound()">

    <a href="index.html" class="back-link">🌅🚶‍♂️</a>

    <div class="fade-in-wrapper">
        <h1>火をおこしています...</h1>

        <div id="post-area" onclick="event.stopPropagation()">
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSdmb8enpDxeRpWTvIXLgZfTegnuuUzee6MqfiNtC2kuji45YQ/formResponse" 
                  method="POST" 
                  target="hidden_iframe"
                  onsubmit="submitted=true;">
                <input type="text" name="entry.389426829" id="post-msg" placeholder="何かを、置いていく" required autocomplete="off">
                <button type="submit">🫱➰🪵🔥</button>
            </form>
        </div>

        <div id="timeline">ZZZ...</div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(typeof submitted !== 'undefined' && submitted){handleFinish();}"></iframe>

    <script>
        const soundFiles = [
            "fire_02.mp3",
            "sugar_cane_02.mp3",
            "sugar_cane_01.mp3",
            "mountain_01.mp3",
            "mountain_02.mp3"
        ];

        let currentAudio = null;
        let fadeInterval = null;

        function playClickSound() {
            if (currentAudio && !currentAudio.paused) {
                fadeOutAndStop();
                return;
            }

            const randomIndex = Math.floor(Math.random() * soundFiles.length);
            const audio = new Audio(soundFiles[randomIndex]);
            audio.loop = true; // キャンプの音も途切れんようにループにしといたよ！
            audio.volume = 0;
            
            audio.play().catch(e => console.log("再生エラー:", e));

            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (audio.volume < 0.19) {
                    audio.volume = parseFloat((audio.volume + 0.01).toFixed(2));
                } else {
                    audio.volume = 0.2; 
                    clearInterval(fadeInterval);
                }
            }, 50);

            currentAudio = audio;
        }

        function fadeOutAndStop() {
            if (!currentAudio) return;
            const audioToStop = currentAudio;
            clearInterval(fadeInterval);
            
            fadeInterval = setInterval(() => {
                if (audioToStop.volume > 0.01) {
                    audioToStop.volume = parseFloat((audioToStop.volume - 0.01).toFixed(2));
                } else {
                    audioToStop.pause();
                    audioToStop.currentTime = 0;
                    clearInterval(fadeInterval);
                }
            }, 50); 
        }

        // スマホで画面を閉じた・裏に回した時は【即座に】止める
        function immediateStop() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                clearInterval(fadeInterval);
            }
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden') immediateStop();
        });
        window.addEventListener("pagehide", immediateStop);


        // --- 掲示板の機能 ---
        let submitted = false;
        const sheetId = '1QPDC4dCfAlZtU2VY76jBFiRd1y5BE_c2_8bZ_7ZBbp4';

        function handleFinish() {
            document.getElementById('post-msg').value = "";
            submitted = false;
            setTimeout(loadTimeline, 3000);
        }

        function loadTimeline() {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:drawTimeline&t=${Date.now()}`;
            document.body.appendChild(script);
        }

        window.drawTimeline = function(data) {
            const rows = data.table.rows;
            const timeline = document.getElementById('timeline');
            let html = '';
            for (let i = rows.length - 1; i >= 0; i--) {
                const cells = rows[i].c;
                if (!cells) continue;
                const time = cells[0] ? (cells[0].f || cells[0].v) : '';
                let message = "";
                if (cells[2] && cells[2].v) message = cells[2].v;
                else if (cells[1] && cells[1].v) message = cells[1].v;

                if (message && message !== "いま、何を思ってる？" && isNaN(message)) {
                    html += `<div class="post"><p>${message}</p><div class="post-info">${time}</div></div>`;
                }
            }
            timeline.innerHTML = html || 'まだ、静かです🍵';
        };

        loadTimeline();
        setInterval(loadTimeline, 15000);
    </script>
</body>
</html>
