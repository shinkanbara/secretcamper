<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シークレットキャンプ🏕️</title>
    <style>
        body { 
            background-color: #0a0f1e; color: #fff8e1; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 50px 20px; box-sizing: border-box;
            font-family: sans-serif; font-weight: 200; cursor: pointer; touch-action: manipulation;
        }
        .back-link { position: absolute; top: 20px; right: 20px; color: rgba(255, 248, 225, 0.8); text-decoration: none; font-size: 1.2rem; z-index: 10; }
        
        .fade-in-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 100%;
            opacity: 0; animation: fadeIn 2.5s ease-in-out forwards; 
        }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
        
        h1 { font-size: 1rem; margin-bottom: 50px; color: rgba(255, 248, 225, 0.5); font-weight: 100; pointer-events: none; }
        
        /* ✨ 投稿エリア（形を元に戻したよ） */
        #post-area { margin-bottom: 60px; text-align: center; width: 100%; max-width: 500px; cursor: auto; position: relative; }
        input[type="text"] { background: transparent; border: none; border-bottom: 1px solid rgba(255, 248, 225, 0.5); color: #fff8e1; padding: 10px; width: 70%; outline: none; font-size: 1rem; }
        button { background: transparent; border: 1px solid #fff8e1; color: #fff8e1; border-radius: 20px; padding: 5px 20px; margin-left: 10px; cursor: pointer; }

        /* 🖼️ 波打つイラスト（動きを20秒に、上下幅を広く！） */
        .wave-illust {
            width: 80px;
            position: absolute; /* 入力欄に対して自由に動けるように */
            left: 50%;
            bottom: -50px; /* 入力欄の少し下からスタート */
            margin-left: -40px; /* 真ん中合わせ */
            pointer-events: none;
            /* 50秒かけて、山なりに往復 */
            animation: superWave 50s ease-in-out infinite alternate;
        }

        @keyframes superWave {
            0% { 
                /* 左端(ボタンの反対)へ & 少し下 & ほぼ透明 */
                transform: translate(-140px, 10px); 
                opacity: 0.1; 
            }
            50% { 
                /* 真ん中 & ぐいっと上へ（上下幅） & 少し濃く */
                transform: translate(0px, -0px); 
                opacity: 0.5;
            }
            100% { 
                /* 右端(ボタン側)へ & 少し下 & はっきり */
                transform: translate(140px, 10px); 
                opacity: 0.9; 
            }
        }

        #timeline { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: flex-start; pointer-events: none; }
        .post { border-bottom: 1px solid rgba(255, 248, 225, 0.1); padding: 25px 0; width: 100%; text-align: left; }
        p { font-size: 0.95rem; line-height: 1.8; letter-spacing: 0.1em; margin: 0; white-space: pre-wrap; }
        .post-info { font-size: 0.7rem; color: rgba(255, 248, 225, 0.3); margin-top: 10px; }
        #hidden_iframe { display: none; }

        .audio-guide {
            margin-top: 0px; /* 上の文字との隙間 */
            font-size: 0.6rem; /* さらに小さく */
            color: rgba(255, 248, 225, 0.15); /* さらに薄く、気配だけ */
            letter-spacing: 0.1em;
        }

    </style>
</head>
<body id="camp-body">

    <a href="index.html" class="back-link">🌅🚶‍♂️</a>

    <div class="fade-in-wrapper">
        <h1>火をおこしています...</h1>
        <p class="audio-guide">タップで音が出ます</p>

        <div id="post-area" onclick="event.stopPropagation()">
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSdmb8enpDxeRpWTvIXLgZfTegnuuUzee6MqfiNtC2kuji45YQ/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                <input type="text" name="entry.389426829" id="post-msg" placeholder="何かを、置いていく" required autocomplete="off">
                <button type="submit">🫱➰🪵🔥</button>
            </form>
            
            <img src="neko.png" alt="ゆらゆら" class="wave-illust">
        </div>

        <div id="timeline"></div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(typeof submitted !== 'undefined' && submitted){handleFinish();}"></iframe>

    <script>
        const soundFiles = ["fire_02.mp3", "sugar_cane_02.mp3", "sugar_cane_01.mp3", "mountain_01.mp3", "mountain_02.mp3"];
        let audio = null;
        let fadeInterval = null;
        let isFadingOut = false;

        function killAudio() {
            clearInterval(fadeInterval);
            isFadingOut = false;
            if (audio) {
                audio.pause();
                audio.src = "";
                audio.load();
                audio = null;
            }
        }

        function fadeOutAndKill() {
            if (!audio || isFadingOut) return;
            isFadingOut = true;
            clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (audio && audio.volume > 0.01) {
                    audio.volume = Math.max(0, audio.volume - 0.01).toFixed(2);
                } else {
                    killAudio();
                }
            }, 50);
        }

        document.getElementById('camp-body').addEventListener('click', function(e) {
            if (e.target.closest('a') || e.target.closest('#post-area')) return;

            if (audio && !audio.paused && !isFadingOut) {
                fadeOutAndKill();
            } else if (!isFadingOut) {
                killAudio();
                const randomIndex = Math.floor(Math.random() * soundFiles.length);
                audio = new Audio(soundFiles[randomIndex]);
                audio.loop = true;
                audio.volume = 0;
                audio.play().catch(e => console.log("再生制限"));

                fadeInterval = setInterval(() => {
                    if (audio && audio.volume < 0.1) {
                        audio.volume = parseFloat((audio.volume + 0.01).toFixed(2));
                    } else { clearInterval(fadeInterval); }
                }, 50);
            }
        });

        window.addEventListener("pagehide", killAudio);
        window.addEventListener("beforeunload", killAudio);
        window.addEventListener("blur", killAudio);
        document.addEventListener("visibilitychange", () => { if (document.hidden) killAudio(); });

        let submitted = false;
        const sheetId = '1QPDC4dCfAlZtU2VY76jBFiRd1y5BE_c2_8bZ_7ZBbp4';
        function handleFinish() { document.getElementById('post-msg').value = ""; submitted = false; setTimeout(loadTimeline, 3000); }
        function loadTimeline() {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:drawTimeline&t=${Date.now()}`;
            document.body.appendChild(script);
        }
        window.drawTimeline = function(data) {
            const rows = data.table.rows; const timeline = document.getElementById('timeline'); let html = '';
            for (let i = rows.length - 1; i >= 0; i--) {
                const cells = rows[i].c; if (!cells) continue;
                const time = cells[0] ? (cells[0].f || cells[0].v) : '';
                let message = cells[2]?.v || cells[1]?.v || "";
                if (message && message !== "いま、何を思ってる？" && isNaN(message)) {
                    html += `<div class="post"><p>${message}</p><div class="post-info">${time}</div></div>`;
                }
            }
            timeline.innerHTML = html || '<div class="post"><p>まだ、静かです🍵</p></div>';
        };
        loadTimeline(); setInterval(loadTimeline, 15000);
    </script>
</body>
</html>
